<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Zeitschriften-OCR Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #nav-bar { display: flex; justify-content: center; gap: 12px; padding: 8px; background: #f0f0f0; border-bottom: 1px solid #ccc; flex-shrink: 0; }
    #nav-bar button { padding: 4px 16px; cursor: pointer; }
    #nav-bar button:disabled { opacity: 0.4; cursor: default; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #sidebar { width: 220px; overflow-y: auto; border-right: 1px solid #ccc; flex-shrink: 0; background: #fafafa; }
    #sidebar .file-item { padding: 6px 10px; cursor: pointer; font-size: 0.85rem; word-break: break-all; border-bottom: 1px solid #e8e8e8; }
    #sidebar .file-item:hover { background: #e8f0fe; }
    #sidebar .file-item.active { background: #c2d7ff; font-weight: bold; }
    #image-panel { flex: 1; overflow: hidden; position: relative; cursor: grab; background: #333; }
    #image-panel.dragging { cursor: grabbing; }
    #image-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; }
    #tiff-img { display: block; }
    #overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
    #text-panel { width: 380px; overflow-y: auto; padding: 12px; flex-shrink: 0; border-left: 1px solid #ccc; line-height: 1.8; }
    .word { cursor: pointer; }
    .word.selected { font-weight: bold; background: rgba(255,220,0,0.5); }
    /* Word edit input — inline-block so it sits in flowing text */
    .word-input {
      display: inline-block;
      font: inherit;
      font-size: inherit;
      line-height: inherit;
      border: 1px solid #666;
      border-radius: 2px;
      padding: 0 2px;
      min-width: 60px;
      outline: none;
      vertical-align: baseline;
      box-sizing: content-box;
    }
    /* Inline error message below the input */
    .word-error {
      display: block;
      font-size: 0.78rem;
      color: #c00;
      margin-top: 2px;
    }
    /* Green flash on successful save — applied to .word span after edit closes */
    @keyframes flash-green {
      0%   { background-color: rgba(0, 180, 0, 0.45); }
      100% { background-color: transparent; }
    }
    .word-saved {
      animation: flash-green 1s ease-out forwards;
    }
    #zoom-reset-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 10;
      padding: 3px 10px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.82rem;
      cursor: pointer;
      display: none;
    }
    #zoom-reset-btn:hover { background: rgba(0,0,0,0.8); }
    #segment-btn {
      padding: 4px 12px;
      background: #5a6edc;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    #segment-btn:hover:not(:disabled) { background: #4458c8; }
    #segment-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #segment-btn.running::after { content: ' …'; }

    #segment-status {
      font-size: 0.78rem;
      color: #c00;
      margin-left: 6px;
      display: none;
    }
    #segment-status.visible { display: inline; }

    .segment-region {
      pointer-events: none;
      stroke-width: 2;
    }
    .segment-label {
      font-size: 11px;
      font-family: sans-serif;
      pointer-events: none;
      paint-order: stroke fill;
      stroke: #fff;
      stroke-width: 3;
      fill: #111;
    }
    /* Article list panel — sits below OCR words in #text-panel */
    #article-section {
      margin-top: 16px;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }
    #article-section h3 {
      font-size: 0.80rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 8px;
    }
    .article-card {
      padding: 6px 8px;
      margin-bottom: 4px;
      border: 1px solid #dde;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.82rem;
      background: #f4f6ff;
      user-select: none;
    }
    .article-card:hover { background: #dce4ff; border-color: #99b; }
    .article-card.active { background: #c2d7ff; border-color: #668; font-weight: 600; }
    .article-card .article-type {
      font-size: 0.70rem;
      text-transform: uppercase;
      color: #557;
      margin-bottom: 2px;
    }
    /* Distinct highlight rect for article region — not cleared by segment operations */
    #article-highlight-rect {
      display: none;
      fill: rgba(80, 180, 80, 0.25);
      stroke: #2a8c2a;
      stroke-width: 2;
      stroke-dasharray: 6 3;
    }
  </style>
</head>
<body>
  <div id="nav-bar">
    <a href="/" style="padding:4px 10px;font-size:0.85rem;color:#1a73e8;text-decoration:none;align-self:center;">&#8592; Upload</a>
    <button id="btn-prev" disabled>&#8592; Previous</button>
    <button id="btn-next" disabled>&#8594; Next</button>
    <button id="segment-btn" onclick="segmentPage()" disabled title="Detect article regions using the configured VLM provider">Segment</button>
    <span id="segment-status"></span>
  </div>
  <div id="main">
    <div id="sidebar"><!-- file list injected here --></div>
    <div id="image-panel">
      <div id="image-container">
        <img id="tiff-img" src="" alt="">
        <svg id="overlay" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;">
          <rect id="highlight-rect" style="display:none;" fill="rgba(255,220,0,0.35)" stroke="orange" stroke-width="2"/>
          <rect id="article-highlight-rect"/>
        </svg>
      </div>
    </div>
    <div id="text-panel"><!-- word spans injected here --></div>
  </div>
  <script>
    let stems = [];
    let currentIndex = -1;
    let currentStem = null;
    let jpeg_width = 0;
    let jpeg_height = 0;
    let pageWidth = 0;
    let pageHeight = 0;
    let wordById = {};
    let activeWord = null;
    let loadGen = 0;
    let editingSpan = null;   // the .word span currently in edit mode

    const REGION_COLORS = {
      headline:      'rgba(255,100,100,0.35)',
      article:       'rgba(100,150,255,0.25)',
      advertisement: 'rgba(255,200,50,0.30)',
      illustration:  'rgba(100,220,100,0.30)',
      caption:       'rgba(200,100,255,0.25)',
    };

    // Zoom/pan state
    let zoomLevel = 1.0;     // current scale factor (1.0 = fit-to-width)
    let fitScale = 1.0;      // scale factor that makes image fill panel width
    let panX = 0;            // current horizontal pan offset in CSS px
    let panY = 0;            // current vertical pan offset in CSS px
    const ZOOM_MIN = 0.25;   // 25% of fit-to-width baseline
    const ZOOM_MAX = 4.0;    // 400% of fit-to-width baseline
    const ZOOM_STEP = 1.3;   // multiply/divide per wheel tick

    // Drag state
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragStartPanX = 0;
    let dragStartPanY = 0;
    let didPan = false;

    document.addEventListener('DOMContentLoaded', async () => {
      setupResizeObserver();
      setupKeyboard();
      setupNavButtons();
      setupZoomPan();

      document.getElementById('highlight-rect').addEventListener('click', () => {
        if (didPan) { didPan = false; return; }
        const rect = document.getElementById('highlight-rect');
        const span = document.querySelector(`.word[data-id="${rect.dataset.wordId}"]`);
        if (!span) return;
        document.querySelectorAll('.word.selected').forEach(s => s.classList.remove('selected'));
        span.classList.add('selected');
        span.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });

      document.getElementById('tiff-img').addEventListener('error', () => {
        document.getElementById('tiff-img').alt = 'Image not available for this file';
      });

      const resp = await fetch('/files');
      const data = await resp.json();
      stems = data.stems;
      renderSidebar(stems);
      if (stems.length > 0) loadFile(0);

      // Deep-link: if URL has a #region_id hash, highlight that region after load
      if (location.hash) {
        // Wait for loadFile() + loadArticles() to complete (they are async)
        // Use a short poll — 50ms intervals, up to 2s total
        const targetId = location.hash.slice(1);
        let attempts = 0;
        const poll = setInterval(() => {
          attempts++;
          if (currentArticles.length > 0 || attempts > 40) {
            clearInterval(poll);
            highlightRegionById(targetId);
          }
        }, 50);
      }
    });

    function renderSidebar(stems) {
      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = stems.map((stem, i) =>
        `<div class="file-item" data-index="${i}">${escapeHtml(stem)}</div>`
      ).join('');
      sidebar.addEventListener('click', (e) => {
        const item = e.target.closest('.file-item');
        if (!item) return;
        loadFile(parseInt(item.dataset.index, 10));
      });
    }

    async function loadFile(index) {
      if (index < 0 || index >= stems.length) return;
      currentIndex = index;
      if (editingSpan) cancelEdit();
      editingSpan = null;
      const gen = ++loadGen;
      const stem = stems[index];

      // Clear stale segment overlay and status at start of each file load
      clearSegmentRegions();
      clearArticleHighlight();
      activeArticleId = null;
      const segStatus = document.getElementById('segment-status');
      if (segStatus) { segStatus.classList.remove('visible'); segStatus.textContent = ''; }

      document.querySelectorAll('#sidebar .file-item').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });

      document.getElementById('btn-prev').disabled = (index === 0);
      document.getElementById('btn-next').disabled = (index === stems.length - 1);

      clearHighlight();
      activeWord = null;
      document.getElementById('text-panel').innerHTML = '<em>Loading\u2026</em>';
      document.getElementById('text-panel').scrollTop = 0;

      // Enable Segment button and track current stem
      currentStem = stem;
      document.getElementById('segment-btn').disabled = false;

      const img = document.getElementById('tiff-img');
      img.src = `/image/${stem}`;

      try {
        const data = await fetch(`/alto/${stem}`).then(r => r.json());
        if (gen !== loadGen) return;
        pageWidth = data.page_width;
        pageHeight = data.page_height;
        jpeg_width = data.jpeg_width || 0;
        jpeg_height = data.jpeg_height || 0;
        recomputeFitScale();
        wordById = Object.fromEntries(data.words.map(w => [w.id, w]));
        renderWords(data.words);
        loadSegments(stem);
        loadArticles(stem);
      } catch (err) {
        if (gen !== loadGen) return;
        document.getElementById('text-panel').innerHTML = `<em>Error loading ALTO: ${escapeHtml(String(err))}</em>`;
      }
    }

    function renderWords(words) {
      const panel = document.getElementById('text-panel');
      if (words.length === 0) {
        panel.innerHTML = '<em>No words found in this file.</em>';
        return;
      }
      panel.innerHTML = words.map(w =>
        `<span class="word" data-id="${escapeHtml(w.id)}">${escapeHtml(w.content)}</span> `
      ).join('');
      panel.onclick = (e) => {
        // Ignore clicks that land inside an open input or error span
        if (e.target.tagName === 'INPUT' || e.target.classList.contains('word-error')) return;
        const span = e.target.closest('.word');
        if (!span) return;
        // Cancel any in-progress edit before opening a new one
        if (editingSpan && editingSpan !== span) cancelEdit();
        if (editingSpan === span) return; // already editing this word — ignore re-click
        const word = wordById[span.dataset.id];
        if (!word) return;
        editWord(word, span);
      };
    }

    function selectWord(word, span) {
      document.querySelectorAll('.word.selected').forEach(s => s.classList.remove('selected'));
      span.classList.add('selected');
      activeWord = word;

      showHighlight(word);

      const rect = document.getElementById('highlight-rect');
      rect.dataset.wordId = word.id;
      rect.style.pointerEvents = 'all';

      rect.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showHighlight(word) {
      const img = document.getElementById('tiff-img');
      if (!img.clientWidth || !pageWidth || !pageHeight) return;
      const scaleX = img.clientWidth / pageWidth;
      const scaleY = img.clientHeight / pageHeight;
      const rect = document.getElementById('highlight-rect');
      rect.setAttribute('x', word.hpos * scaleX);
      rect.setAttribute('y', word.vpos * scaleY);
      rect.setAttribute('width', word.width * scaleX);
      rect.setAttribute('height', word.height * scaleY);
      rect.style.display = '';
    }

    function clearHighlight() {
      const rect = document.getElementById('highlight-rect');
      rect.style.display = 'none';
      rect.style.pointerEvents = 'none';
      activeWord = null;
    }

    function setupResizeObserver() {
      const panel = document.getElementById('image-panel');
      const observer = new ResizeObserver(() => {
        recomputeFitScale();
        if (activeWord !== null) showHighlight(activeWord);
      });
      observer.observe(panel);
    }

    function setupNavButtons() {
      document.getElementById('btn-prev').addEventListener('click', () => navigateTo(currentIndex - 1));
      document.getElementById('btn-next').addEventListener('click', () => navigateTo(currentIndex + 1));
    }

    function navigateTo(index) {
      if (index >= 0 && index < stems.length) loadFile(index);
    }

    function setupKeyboard() {
      document.addEventListener('keydown', (e) => {
        if (document.activeElement.tagName === 'INPUT') return;
        if (e.key === 'ArrowLeft') navigateTo(currentIndex - 1);
        if (e.key === 'ArrowRight') navigateTo(currentIndex + 1);
        if (e.key === '+' || e.key === '=') {
          e.preventDefault();
          applyZoom(ZOOM_STEP, null);
        }
        if (e.key === '-') {
          e.preventDefault();
          applyZoom(1 / ZOOM_STEP, null);
        }
        if (e.key === '0') {
          e.preventDefault();
          recomputeFitScale();
        }
      });
    }

    function editWord(word, span) {
      // Hide SVG overlay for this word while editing
      clearHighlight();

      editingSpan = span;

      // Measure span's current rendered width for input sizing
      const spanWidth = Math.max(60, span.offsetWidth);

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'word-input';
      input.value = word.content;
      input.style.width = spanWidth + 'px';
      input.dataset.wordId = word.id;

      const errorSpan = document.createElement('span');
      errorSpan.className = 'word-error';
      errorSpan.style.display = 'none';

      // Replace span content with input (keep span in DOM for cancel restore)
      span.textContent = '';
      span.appendChild(input);
      span.appendChild(errorSpan);

      input.focus();
      input.select();

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          saveWord(word, span, input, errorSpan);
        }
        if (e.key === 'Escape') {
          e.preventDefault();
          cancelEdit();
        }
      });

      // Blur = cancel (silently restore)
      input.addEventListener('blur', () => {
        // Use setTimeout to let click on another word fire first,
        // so cancelEdit() from the onclick handler runs before blur
        setTimeout(() => {
          if (editingSpan === span) cancelEdit();
        }, 0);
      });
    }

    function cancelEdit() {
      if (!editingSpan) return;
      const span = editingSpan;
      const word = wordById[span.dataset.id];
      editingSpan = null;
      // Restore original text
      span.textContent = '';
      span.appendChild(document.createTextNode(word ? word.content : ''));
      // Restore SVG overlay for the word whose edit was cancelled
      if (word) {
        activeWord = word;
        showHighlight(word);
      }
    }

    async function saveWord(word, span, input, errorSpan) {
      const raw = input.value;
      if (!raw.trim()) {
        errorSpan.textContent = 'Word cannot be empty';
        errorSpan.style.display = '';
        return;
      }
      errorSpan.style.display = 'none';

      const stem = stems[currentIndex];
      let resp;
      try {
        resp = await fetch(`/save/${encodeURIComponent(stem)}`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({word_id: word.id, content: raw}),
        });
      } catch (err) {
        errorSpan.textContent = 'Save failed — network error';
        errorSpan.style.display = '';
        return;
      }

      if (!resp.ok) {
        errorSpan.textContent = 'Save failed — invalid content';
        errorSpan.style.display = '';
        return;
      }

      // Success: update in-memory word, restore span with new text, flash green
      word.content = raw;
      editingSpan = null;
      span.textContent = '';
      span.appendChild(document.createTextNode(raw));
      // Trigger green flash — remove class first to allow re-animation if saved twice
      span.classList.remove('word-saved');
      void span.offsetWidth; // force reflow
      span.classList.add('word-saved');
      span.addEventListener('animationend', () => span.classList.remove('word-saved'), {once: true});

      // Restore SVG overlay on the now-corrected word span
      activeWord = word;
      showHighlight(word);

      // Return focus to text panel
      document.getElementById('text-panel').focus();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Zoom / Pan Engine ──────────────────────────────────────────────────────

    function recomputeFitScale() {
      if (!jpeg_width || !jpeg_height) return;
      const panel = document.getElementById('image-panel');
      // Fit the whole image into the panel (contain mode — show full page)
      const scaleW = panel.clientWidth / jpeg_width;
      const scaleH = panel.clientHeight / jpeg_height;
      fitScale = Math.min(scaleW, scaleH);
      zoomLevel = 1.0;
      // Center the image in the panel
      panX = (panel.clientWidth  - jpeg_width  * fitScale) / 2;
      panY = (panel.clientHeight - jpeg_height * fitScale) / 2;
      applyTransform();  // applyTransform calls updateResetButton()
    }

    function applyTransform() {
      const scale = fitScale * zoomLevel;
      document.getElementById('image-container').style.transform =
        `translate(${panX}px, ${panY}px) scale(${scale})`;
      updateResetButton();
    }

    function clampPan() {
      const scale = fitScale * zoomLevel;
      const renderedW = jpeg_width  * scale;
      const renderedH = jpeg_height * scale;
      const panel = document.getElementById('image-panel');
      const panelW = panel.clientWidth;
      const panelH = panel.clientHeight;
      // At least 20% of the rendered image must remain visible on each axis
      panX = Math.min(panelW * 0.8, Math.max(-(renderedW * 0.8), panX));
      panY = Math.min(panelH * 0.8, Math.max(-(renderedH * 0.8), panY));
    }

    function applyZoom(factor, origin) {
      if (editingSpan) cancelEdit();
      const newZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoomLevel * factor));
      const panel = document.getElementById('image-panel');
      const cx = origin ? origin.x : panel.clientWidth / 2;
      const cy = origin ? origin.y : panel.clientHeight / 2;
      const scale = fitScale * zoomLevel;
      const imgX = (cx - panX) / scale;
      const imgY = (cy - panY) / scale;
      const newScale = fitScale * newZoom;
      panX = cx - imgX * newScale;
      panY = cy - imgY * newScale;
      zoomLevel = newZoom;
      clampPan();
      applyTransform();
    }

    function setupZoomPan() {
      const panel = document.getElementById('image-panel');

      // Mouse-wheel zoom
      panel.addEventListener('wheel', (e) => {
        e.preventDefault();
        applyZoom(e.deltaY < 0 ? ZOOM_STEP : 1 / ZOOM_STEP, {x: e.offsetX, y: e.offsetY});
      }, {passive: false});

      // Click-drag pan
      panel.addEventListener('mousedown', (e) => {
        isDragging = true;
        didPan = false;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        dragStartPanX = panX;
        dragStartPanY = panY;
        panel.classList.add('dragging');
      });

      panel.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        if (!didPan && Math.hypot(dx, dy) > 5) {
          didPan = true;
          if (editingSpan) cancelEdit();
        }
        if (didPan) {
          panX = dragStartPanX + dx;
          panY = dragStartPanY + dy;
          clampPan();
          applyTransform();
        }
      });

      panel.addEventListener('mouseup', () => {
        isDragging = false;
        panel.classList.remove('dragging');
      });

      panel.addEventListener('mouseleave', () => {
        isDragging = false;
        panel.classList.remove('dragging');
      });
    }

    function updateResetButton() {
      let btn = document.getElementById('zoom-reset-btn');
      if (!btn) {
        btn = document.createElement('button');
        btn.id = 'zoom-reset-btn';
        document.getElementById('image-panel').appendChild(btn);
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          recomputeFitScale();
        });
      }
      const isDefault = (Math.abs(zoomLevel - 1.0) < 0.01);
      btn.style.display = isDefault ? 'none' : '';
      if (!isDefault) {
        const pct = Math.round(zoomLevel * 100);
        btn.textContent = `${pct}% \u22A1`;
      }
    }

    // ── Segment / Region Overlay ──────────────────────────────────────────────

    function clearSegmentRegions() {
      const svg = document.getElementById('overlay');
      svg.querySelectorAll('.segment-region, .segment-label').forEach(el => el.remove());
    }

    function showSegmentRegions(regions) {
      clearSegmentRegions();
      if (!regions || regions.length === 0) return;
      const svg = document.getElementById('overlay');
      // jpeg_width/jpeg_height are set by loadFile() from the /alto/<stem> response
      const W = jpeg_width;
      const H = jpeg_height;
      if (!W || !H) return;

      regions.forEach(r => {
        const bb = r.bounding_box;
        const x = bb.x * W;
        const y = bb.y * H;
        const w = bb.width * W;
        const h = bb.height * H;
        const color = REGION_COLORS[r.type] || 'rgba(150,150,150,0.25)';
        const stroke = color.replace(/[\d.]+\)$/, '0.8)');  // opaque stroke

        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', x);
        rect.setAttribute('y', y);
        rect.setAttribute('width', w);
        rect.setAttribute('height', h);
        rect.setAttribute('fill', color);
        rect.setAttribute('stroke', stroke);
        rect.classList.add('segment-region');
        svg.appendChild(rect);

        const labelText = `${r.type}: ${r.title.slice(0, 40)}`;
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', x + 4);
        label.setAttribute('y', y + 14);
        label.textContent = labelText;
        label.classList.add('segment-label');
        svg.appendChild(label);
      });
    }

    async function segmentPage() {
      if (!currentStem) return;
      const btn = document.getElementById('segment-btn');
      const status = document.getElementById('segment-status');

      btn.disabled = true;
      btn.classList.add('running');
      status.textContent = '';
      status.classList.remove('visible');

      try {
        const resp = await fetch(`/segment/${currentStem}`, { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) {
          status.textContent = resp.status === 503
            ? 'VLM not configured on this server'
            : (data.error || `Error ${resp.status}`);
          status.classList.add('visible');
          return;
        }
        showSegmentRegions(data.regions);
        const count = data.regions.length;
        status.textContent = count > 0
          ? `${count} region${count !== 1 ? 's' : ''} detected`
          : 'No regions detected';
        status.style.color = '#555';
        status.classList.add('visible');
      } catch (err) {
        status.textContent = 'Network error';
        status.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.classList.remove('running');
      }
    }

    async function loadSegments(stem) {
      clearSegmentRegions();
      const status = document.getElementById('segment-status');
      status.classList.remove('visible');
      try {
        const resp = await fetch(`/segment/${stem}`);
        if (resp.ok) {
          const data = await resp.json();
          showSegmentRegions(data.regions);
          const count = data.regions.length;
          if (count > 0) {
            status.textContent = `${count} region${count !== 1 ? 's' : ''} (stored)`;
            status.style.color = '#555';
            status.classList.add('visible');
          }
        }
        // 404 is expected when not yet segmented — silently ignored
      } catch (e) {
        // Network error — silently ignored (segmentation is optional)
      }
    }

    // ── Article Browser ────────────────────────────────────────────────────────

    let currentArticles = [];   // regions array for current stem
    let activeArticleId = null; // region_id of highlighted article card

    async function loadArticles(stem) {
      currentArticles = [];
      activeArticleId = null;
      renderArticleList([]);  // clear previous
      try {
        const resp = await fetch(`/articles/${encodeURIComponent(stem)}`);
        if (!resp.ok) return;  // 404 = not yet segmented — silently skip
        const data = await resp.json();
        currentArticles = data.regions || [];
        renderArticleList(currentArticles);
      } catch (e) {
        // Network error — silently skip (article list is optional)
      }
    }

    function renderArticleList(regions) {
      const panel = document.getElementById('text-panel');
      // Remove previous article section if present
      const existing = document.getElementById('article-section');
      if (existing) existing.remove();
      if (!regions || regions.length === 0) return;

      const section = document.createElement('div');
      section.id = 'article-section';

      const heading = document.createElement('h3');
      heading.textContent = `Articles (${regions.length})`;
      section.appendChild(heading);

      regions.forEach(region => {
        const card = document.createElement('div');
        card.className = 'article-card';
        card.dataset.regionId = region.id;

        const typeEl = document.createElement('div');
        typeEl.className = 'article-type';
        typeEl.textContent = region.type || 'unknown';

        const titleEl = document.createElement('div');
        titleEl.textContent = region.title || '(no title)';

        card.appendChild(typeEl);
        card.appendChild(titleEl);
        card.addEventListener('click', () => selectArticle(region, card));
        section.appendChild(card);
      });

      panel.appendChild(section);
    }

    function selectArticle(region, cardEl) {
      // Deactivate previously active card
      document.querySelectorAll('.article-card.active').forEach(c => c.classList.remove('active'));
      if (activeArticleId === region.id) {
        // Second click on same card — deselect
        activeArticleId = null;
        clearArticleHighlight();
        return;
      }
      activeArticleId = region.id;
      cardEl.classList.add('active');
      highlightRegion(region);
    }

    function highlightRegion(region) {
      if (!region || !region.bounding_box) return;
      const W = jpeg_width;
      const H = jpeg_height;
      if (!W || !H) return;

      const bb = region.bounding_box;
      const x = bb.x * W;
      const y = bb.y * H;
      const w = bb.width * W;
      const h = bb.height * H;

      const rect = document.getElementById('article-highlight-rect');
      rect.setAttribute('x', x);
      rect.setAttribute('y', y);
      rect.setAttribute('width', w);
      rect.setAttribute('height', h);
      rect.style.display = '';
    }

    function clearArticleHighlight() {
      document.getElementById('article-highlight-rect').style.display = 'none';
    }

    function highlightRegionById(regionId) {
      if (!regionId) return;
      const region = currentArticles.find(r => r.id === regionId);
      if (!region) return;
      const card = document.querySelector(`.article-card[data-region-id="${CSS.escape(regionId)}"]`);
      selectArticle(region, card || document.createElement('div'));
    }
  </script>
</body>
