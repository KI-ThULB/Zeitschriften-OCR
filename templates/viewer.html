<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Zeitschriften-OCR Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    #nav-bar { display: flex; justify-content: center; gap: 12px; padding: 8px; background: #f0f0f0; border-bottom: 1px solid #ccc; flex-shrink: 0; }
    #nav-bar button { padding: 4px 16px; cursor: pointer; }
    #nav-bar button:disabled { opacity: 0.4; cursor: default; }
    #main { display: flex; flex: 1; overflow: hidden; }
    #sidebar { width: 220px; overflow-y: auto; border-right: 1px solid #ccc; flex-shrink: 0; background: #fafafa; }
    #sidebar .file-item { padding: 6px 10px; cursor: pointer; font-size: 0.85rem; word-break: break-all; border-bottom: 1px solid #e8e8e8; }
    #sidebar .file-item:hover { background: #e8f0fe; }
    #sidebar .file-item.active { background: #c2d7ff; font-weight: bold; }
    #image-panel { flex: 1; overflow: hidden; position: relative; cursor: grab; background: #333; touch-action: none; user-select: none; }
    #image-panel.dragging { cursor: grabbing; }
    #image-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; }
    #tiff-img { display: block; }
    #overlay { position: absolute; top: 0; left: 0; pointer-events: none; }
    #text-panel { width: 380px; overflow-y: auto; padding: 12px; flex-shrink: 0; border-left: 1px solid #ccc; line-height: 1.8; }
    .word { cursor: pointer; }
    .word.selected { font-weight: bold; background: rgba(255,220,0,0.5); }
    /* Word edit input — inline-block so it sits in flowing text */
    .word-input {
      display: inline-block;
      font: inherit;
      font-size: inherit;
      line-height: inherit;
      border: 1px solid #666;
      border-radius: 2px;
      padding: 0 2px;
      min-width: 60px;
      outline: none;
      vertical-align: baseline;
      box-sizing: content-box;
    }
    /* Inline error message below the input */
    .word-error {
      display: block;
      font-size: 0.78rem;
      color: #c00;
      margin-top: 2px;
    }
    /* Green flash on successful save — applied to .word span after edit closes */
    @keyframes flash-green {
      0%   { background-color: rgba(0, 180, 0, 0.45); }
      100% { background-color: transparent; }
    }
    .word-saved {
      animation: flash-green 1s ease-out forwards;
    }
    #zoom-reset-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 10;
      padding: 3px 10px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.82rem;
      cursor: pointer;
      display: none;
    }
    #zoom-reset-btn:hover { background: rgba(0,0,0,0.8); }
    #segment-btn {
      padding: 4px 12px;
      background: #5a6edc;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.82rem;
      cursor: pointer;
    }
    #segment-btn:hover:not(:disabled) { background: #4458c8; }
    #segment-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #segment-btn.running::after { content: ' …'; }
    #tei-btn { background: #2e7d32; color: #fff; border: none; border-radius: 3px; padding: 4px 14px; cursor: pointer; font-size: 0.85rem; }
    #tei-btn:hover:not(:disabled) { background: #1b5e20; }
    #tei-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    #segment-status {
      font-size: 0.78rem;
      color: #c00;
      margin-left: 6px;
      display: none;
    }
    #segment-status.visible { display: inline; }

    .segment-region {
      pointer-events: none;
      stroke-width: 2;
    }
    .segment-label {
      font-size: 11px;
      font-family: sans-serif;
      pointer-events: none;
      paint-order: stroke fill;
      stroke: #fff;
      stroke-width: 3;
      fill: #111;
    }
    /* Article list panel — sits below OCR words in #text-panel */
    #article-section {
      margin-top: 16px;
      border-top: 1px solid #ddd;
      padding-top: 10px;
    }
    #article-section h3 {
      font-size: 0.80rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin-bottom: 8px;
    }
    .article-card {
      padding: 6px 8px;
      margin-bottom: 4px;
      border: 1px solid #dde;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.82rem;
      background: #f4f6ff;
      user-select: none;
    }
    .article-card:hover { background: #dce4ff; border-color: #99b; }
    .article-card.active { background: #c2d7ff; border-color: #668; font-weight: 600; }
    .article-card .article-type {
      font-size: 0.70rem;
      text-transform: uppercase;
      color: #557;
      margin-bottom: 2px;
    }
    /* Distinct highlight rect for article region — not cleared by segment operations */
    #article-highlight-rect {
      display: none;
      fill: rgba(80, 180, 80, 0.25);
      stroke: #2a8c2a;
      stroke-width: 2;
      stroke-dasharray: 6 3;
    }
    .para-block {
      margin-bottom: 0.75em;
    }
    .para-block[data-role="heading"] {
      font-weight: bold;
      font-size: 1.1em;
    }
    .para-block[data-role="caption"] {
      font-size: 0.9em;
      font-style: italic;
    }
    .para-block[data-role="advertisement"] {
      font-size: 0.9em;
      font-style: italic;
      border-left: 3px solid #ccc;
      padding-left: 0.4em;
    }
  </style>
</head>
<body>
  <div id="nav-bar">
    <a href="/" style="padding:4px 10px;font-size:0.85rem;color:#1a73e8;text-decoration:none;align-self:center;">&#8592; Upload</a>
    <button id="btn-prev" disabled>&#8592; Previous</button>
    <button id="btn-next" disabled>&#8594; Next</button>
    <button id="segment-btn" onclick="segmentPage()" disabled title="Detect article regions using the configured VLM provider">Segment</button>
    <button id="tei-btn" onclick="downloadTei()" disabled title="Download TEI P5 XML for the current page">Download TEI</button>
    <span id="segment-status"></span>
  </div>
  <div id="main">
    <div id="sidebar"><!-- file list injected here --></div>
    <div id="image-panel">
      <div id="image-container">
        <img id="tiff-img" src="" alt="" draggable="false">
        <svg id="overlay" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;">
          <rect id="highlight-rect" style="display:none;" fill="rgba(255,220,0,0.35)" stroke="orange" stroke-width="2"/>
          <rect id="article-highlight-rect"/>
        </svg>
      </div>
    </div>
    <div id="text-panel">
      <!-- word spans injected into #word-list; #wc-settings is always present -->
      <div id="word-list"><!-- word spans injected here --></div>
      <div id="wc-settings" style="padding:8px 0 4px;border-top:1px solid #eee;margin-top:8px;">
        <label style="font-size:0.78rem;color:#666;display:block;">
          Confidence threshold:
          <input type="range" id="wc-slider" min="0" max="1" step="0.05"
                 style="vertical-align:middle;width:100px;">
          <span id="wc-threshold-label" style="font-size:0.78rem;color:#444;"></span>
        </label>
        <div id="wc-badge" style="font-size:0.78rem;color:#888;margin-top:2px;min-height:1em;"></div>
        <div id="struct-summary" style="font-size:0.78rem;color:#888;margin-top:2px;min-height:1em;"></div>
      </div>
    </div>
  </div>
  <script>
    let stems = [];
    let currentIndex = -1;
    let currentStem = null;
    let jpeg_width = 0;
    let jpeg_height = 0;
    let pageWidth = 0;
    let pageHeight = 0;
    let wordById = {};
    let displayWords = [];    // normalized display word list (column-sorted, hyphen-rejoined)
    let activeWord = null;
    let loadGen = 0;
    let editingSpan = null;   // the .word span currently in edit mode

    // Confidence threshold state (persisted in localStorage)
    const WC_THRESHOLD_KEY = 'wc_threshold';
    let wcThreshold = parseFloat(localStorage.getItem(WC_THRESHOLD_KEY) ?? '0.5');

    const REGION_COLORS = {
      headline:      'rgba(255,100,100,0.35)',
      article:       'rgba(100,150,255,0.25)',
      advertisement: 'rgba(255,200,50,0.30)',
      illustration:  'rgba(100,220,100,0.30)',
      caption:       'rgba(200,100,255,0.25)',
    };

    // Zoom/pan state
    let zoomLevel = 1.0;     // current scale factor (1.0 = fit-to-width)
    let fitScale = 1.0;      // scale factor that makes image fill panel width
    let panX = 0;            // current horizontal pan offset in CSS px
    let panY = 0;            // current vertical pan offset in CSS px
    const ZOOM_MIN = 0.25;   // 25% of fit-to-width baseline
    const ZOOM_MAX = 4.0;    // 400% of fit-to-width baseline
    const ZOOM_STEP = 1.3;   // multiply/divide per wheel tick

    // Drag state
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragStartPanX = 0;
    let dragStartPanY = 0;
    let didPan = false;

    document.addEventListener('DOMContentLoaded', async () => {
      setupResizeObserver();
      setupKeyboard();
      setupNavButtons();
      setupZoomPan();

      // Initialize confidence threshold slider from persisted state
      const slider = document.getElementById('wc-slider');
      const label = document.getElementById('wc-threshold-label');
      if (slider && label) {
        slider.value = wcThreshold;
        label.textContent = wcThreshold.toFixed(2);
      }

      // Slider event — real-time update on 'input' (not 'change')
      document.getElementById('wc-slider')?.addEventListener('input', (e) => {
        wcThreshold = parseFloat(e.target.value);
        localStorage.setItem(WC_THRESHOLD_KEY, wcThreshold);
        document.getElementById('wc-threshold-label').textContent = wcThreshold.toFixed(2);
        applyConfidenceStyling(wcThreshold);
      });

      document.getElementById('highlight-rect').addEventListener('click', () => {
        if (didPan) { didPan = false; return; }
        const rect = document.getElementById('highlight-rect');
        const span = document.querySelector(`.word[data-id="${rect.dataset.wordId}"]`);
        if (!span) return;
        document.querySelectorAll('.word.selected').forEach(s => s.classList.remove('selected'));
        span.classList.add('selected');
        span.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      });

      document.getElementById('tiff-img').addEventListener('error', () => {
        document.getElementById('tiff-img').alt = 'Image not available for this file';
      });

      const resp = await fetch('/files');
      const data = await resp.json();
      stems = data.stems;
      renderSidebar(stems);

      // If server provided an initial stem (from /viewer/<stem> URL), load that file
      const initialStem = {{ initial_stem|tojson }};
      let startIndex = 0;
      if (initialStem !== null) {
        const idx = stems.indexOf(initialStem);
        if (idx >= 0) startIndex = idx;
      }
      if (stems.length > 0) loadFile(startIndex);

      // Deep-link: if URL has a #region_id hash, highlight that region after load
      if (location.hash) {
        // Decode in case the hash was URI-encoded
        const targetId = decodeURIComponent(location.hash.slice(1));
        // Poll until loadArticles() populates currentArticles — up to 5s
        let attempts = 0;
        const poll = setInterval(() => {
          attempts++;
          if (currentArticles.length > 0 || attempts > 100) {
            clearInterval(poll);
            if (currentArticles.length > 0) highlightRegionById(targetId);
          }
        }, 50);
      }
    });

    function renderSidebar(stems) {
      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = stems.map((stem, i) =>
        `<div class="file-item" data-index="${i}">${escapeHtml(stem)}</div>`
      ).join('');
      sidebar.addEventListener('click', (e) => {
        const item = e.target.closest('.file-item');
        if (!item) return;
        loadFile(parseInt(item.dataset.index, 10));
      });
    }

    async function loadFile(index) {
      if (index < 0 || index >= stems.length) return;
      currentIndex = index;
      if (editingSpan) cancelEdit();
      editingSpan = null;
      const gen = ++loadGen;
      const stem = stems[index];

      // Clear stale segment overlay and status at start of each file load
      clearSegmentRegions();
      clearArticleHighlight();
      activeArticleId = null;
      const segStatus = document.getElementById('segment-status');
      if (segStatus) { segStatus.classList.remove('visible'); segStatus.textContent = ''; }

      document.querySelectorAll('#sidebar .file-item').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });

      document.getElementById('btn-prev').disabled = (index === 0);
      document.getElementById('btn-next').disabled = (index === stems.length - 1);

      clearHighlight();
      activeWord = null;
      document.getElementById('word-list').innerHTML = '<em>Loading\u2026</em>';
      document.getElementById('text-panel').scrollTop = 0;

      // Enable Segment and TEI buttons, track current stem
      currentStem = stem;
      document.getElementById('segment-btn').disabled = false;
      document.getElementById('tei-btn').disabled = false;

      const img = document.getElementById('tiff-img');
      img.src = `/image/${stem}`;

      try {
        const data = await fetch(`/alto/${stem}`).then(r => r.json());
        if (gen !== loadGen) return;
        pageWidth = data.page_width;
        pageHeight = data.page_height;
        jpeg_width = data.jpeg_width || 0;
        jpeg_height = data.jpeg_height || 0;
        recomputeFitScale();
        // wordById uses original data.words (not normalized) — edit/save operates on ALTO-original content
        wordById = Object.fromEntries(data.words.map(w => [w.id, w]));
        displayWords = normalizeWords(data.words, data.blocks || [], data.page_width);
        currentBlocks = data.blocks || [];
        const paraBlocks = buildParaBlocks(currentBlocks, wordById, currentArticles, pageWidth, pageHeight);
        renderBlocks(paraBlocks);
        updateStructSummary(paraBlocks);
        applyConfidenceStyling(wcThreshold);
        loadSegments(stem);
        loadArticles(stem);
      } catch (err) {
        if (gen !== loadGen) return;
        document.getElementById('word-list').innerHTML = `<em>Error loading ALTO: ${escapeHtml(String(err))}</em>`;
      }
    }

    // ── Text Normalization Pipeline ────────────────────────────────────────────

    /**
     * clusterByHpos(blocks, pageWidth)
     * Groups column-level TextBlocks into horizontal clusters.
     * A new cluster starts when the HPOS gap exceeds 5% of page width.
     * Returns [{centerHpos: number, blocks: [...]}]
     */
    function clusterByHpos(blocks, pageWidth) {
      if (!blocks || blocks.length === 0) return [];
      const sorted = [...blocks].sort((a, b) => a.hpos - b.hpos);
      const clusters = [];
      let current = { blocks: [sorted[0]] };
      for (let i = 1; i < sorted.length; i++) {
        const prev = current.blocks[current.blocks.length - 1];
        if (sorted[i].hpos - prev.hpos > pageWidth * 0.05) {
          // Compute centerHpos for current cluster before starting new one
          current.centerHpos = current.blocks.reduce((s, b) => s + b.hpos, 0) / current.blocks.length;
          clusters.push(current);
          current = { blocks: [sorted[i]] };
        } else {
          current.blocks.push(sorted[i]);
        }
      }
      current.centerHpos = current.blocks.reduce((s, b) => s + b.hpos, 0) / current.blocks.length;
      clusters.push(current);
      return clusters;
    }

    /**
     * columnSort(words, blocks, pageWidth)
     * Sorts words into natural newspaper reading order.
     * Full-width blocks (>60% page width, near left edge) come first top-to-bottom.
     * Column blocks are clustered left-to-right, then sorted top-to-bottom within each cluster.
     * Falls back to original word order if no blocks.
     */
    function columnSort(words, blocks, pageWidth) {
      if (!blocks || blocks.length === 0) return words;
      const FULL_WIDTH_THRESHOLD = 0.6;
      const fullWidthBlocks = blocks.filter(b =>
        b.width >= pageWidth * FULL_WIDTH_THRESHOLD && b.hpos < pageWidth * 0.05
      );
      const columnBlocks = blocks.filter(b =>
        !(b.width >= pageWidth * FULL_WIDTH_THRESHOLD && b.hpos < pageWidth * 0.05)
      );
      // Sort full-width blocks top-to-bottom
      fullWidthBlocks.sort((a, b) => a.vpos - b.vpos);
      // Cluster and sort column blocks left-to-right, then top-to-bottom within each cluster
      const clusters = clusterByHpos(columnBlocks, pageWidth);
      clusters.sort((a, b) => a.centerHpos - b.centerHpos);
      clusters.forEach(col => col.blocks.sort((a, b) => a.vpos - b.vpos));
      // Build word lookup
      const wordMap = Object.fromEntries(words.map(w => [w.id, w]));
      // Build ordered ID list: full-width blocks first, then column clusters left-to-right
      const allBlockIds = [
        ...fullWidthBlocks.flatMap(b => b.word_ids || []),
        ...clusters.flatMap(col => col.blocks.flatMap(b => b.word_ids || [])),
      ];
      // Deduplicate and map back to word objects
      const seen = new Set();
      const ordered = [];
      for (const id of allBlockIds) {
        if (!seen.has(id) && wordMap[id]) {
          seen.add(id);
          ordered.push(wordMap[id]);
        }
      }
      // Append words not referenced by any block (ALTO files without TextBlock elements)
      for (const w of words) {
        if (!seen.has(w.id)) ordered.push(w);
      }
      return ordered;
    }

    /**
     * rejoinHyphens(words)
     * Rejoins end-of-line hyphenated words.
     * Uses line_end flag from Plan 01 API extension.
     * The joined word inherits id and coordinates of the first fragment.
     * wordById[id] still returns un-rejoined ALTO content for edit/save.
     */
    function rejoinHyphens(words) {
      const result = [];
      let i = 0;
      while (i < words.length) {
        const w = words[i];
        if (w.line_end && w.content.endsWith('-') && i + 1 < words.length) {
          const next = words[i + 1];
          // Strip the trailing hyphen and concatenate with the first word of the next line.
          // The joined word inherits the id and coordinates of the first fragment.
          // This preserves click-to-edit behavior: wordById[id] returns the un-rejoined ALTO content.
          const joined = { ...w, content: w.content.slice(0, -1) + next.content };
          result.push(joined);
          i += 2;
        } else {
          result.push(w);
          i += 1;
        }
      }
      return result;
    }

    /**
     * normalizeWords(words, blocks, pageWidth)
     * Full normalization pipeline: column sort then hyphen rejoin.
     */
    function normalizeWords(words, blocks, pageWidth) {
      const ordered = columnSort(words, blocks, pageWidth);
      return rejoinHyphens(ordered);
    }

    // ── Paragraph Detection & Role Assignment (Phase 20) ─────────────────────

    // VLM type → structural role mapping
    const VLM_TYPE_TO_ROLE = {
      headline:      'heading',
      article:       'paragraph',
      advertisement: 'advertisement',
      illustration:  'paragraph',
      caption:       'caption',
    };

    /**
     * detectParagraphs(block, wordById)
     * Splits a TextBlock into paragraph groups by detecting VPOS gaps > 1.5x the median inter-line gap.
     * Returns [{block, words: [...]}] — one entry per detected paragraph within the block.
     */
    function detectParagraphs(block, wordById) {
      const blockWords = (block.word_ids || [])
        .map(id => wordById[id])
        .filter(Boolean);
      blockWords.sort((a, b) => a.vpos - b.vpos);

      if (blockWords.length === 0) return [{ block, words: [] }];

      const vposValues = [...new Set(blockWords.map(w => w.vpos))].sort((a, b) => a - b);
      if (vposValues.length <= 1) return [{ block, words: blockWords }];

      const gaps = [];
      for (let i = 1; i < vposValues.length; i++) {
        gaps.push(vposValues[i] - vposValues[i - 1]);
      }
      const sorted = [...gaps].sort((a, b) => a - b);
      const median = sorted[Math.floor(sorted.length / 2)];
      const threshold = median * 1.5;

      const paragraphs = [];
      let current = [];
      for (const w of blockWords) {
        if (current.length > 0) {
          const lastVpos = current[current.length - 1].vpos;
          if (w.vpos - lastVpos > threshold) {
            paragraphs.push(current);
            current = [];
          }
        }
        current.push(w);
      }
      if (current.length > 0) paragraphs.push(current);

      return paragraphs.map(words => ({ block, words }));
    }

    /**
     * intersectionArea(ax1, ay1, ax2, ay2, bx1, by1, bx2, by2)
     * Returns the area of the intersection of two axis-aligned rectangles, or 0 if they don't overlap.
     */
    function intersectionArea(ax1, ay1, ax2, ay2, bx1, by1, bx2, by2) {
      const ix1 = Math.max(ax1, bx1);
      const iy1 = Math.max(ay1, by1);
      const ix2 = Math.min(ax2, bx2);
      const iy2 = Math.min(ay2, by2);
      if (ix2 <= ix1 || iy2 <= iy1) return 0;
      return (ix2 - ix1) * (iy2 - iy1);
    }

    /**
     * assignRoles(blocks, articles, pageWidth, pageHeight)
     * For each block, finds the VLM region with the greatest bounding-box overlap and maps its type
     * to a structural role via VLM_TYPE_TO_ROLE. Defaults to 'paragraph' when no overlap found.
     * Returns Map<block.id, role>.
     */
    function assignRoles(blocks, articles, pageWidth, pageHeight) {
      const roleMap = new Map();
      for (const block of blocks) {
        let bestRole = 'paragraph';
        let bestArea = 0;
        for (const region of articles) {
          const bb = region.bounding_box;
          const rx1 = bb.x * pageWidth;
          const ry1 = bb.y * pageHeight;
          const rx2 = rx1 + bb.width * pageWidth;
          const ry2 = ry1 + bb.height * pageHeight;
          const area = intersectionArea(
            block.hpos, block.vpos,
            block.hpos + block.width, block.vpos + block.height,
            rx1, ry1, rx2, ry2
          );
          if (area > bestArea) {
            bestArea = area;
            bestRole = VLM_TYPE_TO_ROLE[region.type] || 'paragraph';
          }
        }
        roleMap.set(block.id, bestRole);
      }
      return roleMap;
    }

    /**
     * buildParaBlocks(blocks, wordById, articles, pageWidth, pageHeight)
     * Top-level coordinator: assigns roles, detects paragraphs within each block,
     * and appends orphan words (not referenced by any block) as a final paragraph fallback.
     * Returns [{block, role, words: [...]}].
     */
    function buildParaBlocks(blocks, wordById, articles, pageWidth, pageHeight) {
      const roleMap = assignRoles(blocks, articles, pageWidth, pageHeight);
      const result = [];
      for (const block of blocks) {
        const role = roleMap.get(block.id) || 'paragraph';
        const subParas = detectParagraphs(block, wordById);
        for (const { words } of subParas) {
          result.push({ block, role, words });
        }
      }
      // Append words not referenced by any block (ALTO files without TextBlock structure)
      const coveredIds = new Set(result.flatMap(pb => pb.words.map(w => w.id)));
      const orphans = Object.values(wordById).filter(w => !coveredIds.has(w.id));
      if (orphans.length > 0) {
        result.push({ block: null, role: 'paragraph', words: orphans });
      }
      return result;
    }

    // ── Confidence Threshold UI ────────────────────────────────────────────────

    /**
     * applyConfidenceStyling(threshold)
     * Applies opacity fading to .word[data-wc] spans below threshold.
     * Updates the low-confidence badge count.
     * Does NOT re-render — mutates opacity on existing spans only.
     */
    function applyConfidenceStyling(threshold) {
      let lowCount = 0;
      document.querySelectorAll('.word[data-wc]').forEach(span => {
        const raw = span.dataset.wc;
        if (raw === '' || raw === null || raw === undefined) {
          // No WC attribute — leave unstyled
          span.style.opacity = '';
          span.title = '';
          return;
        }
        const wc = parseFloat(raw);
        if (!isNaN(wc) && wc < threshold) {
          span.style.opacity = '0.4';
          span.title = `Confidence: ${wc.toFixed(2)}`;
          lowCount++;
        } else {
          span.style.opacity = '';
          span.title = '';
        }
      });
      const badge = document.getElementById('wc-badge');
      if (badge) {
        badge.textContent = lowCount > 0 ? `${lowCount} low-confidence word${lowCount === 1 ? '' : 's'}` : '';
      }
    }

    // Delegated click handler for #word-list — shared by renderWords() and renderBlocks()
    function wordListClickHandler(e) {
      // Ignore clicks that land inside an open input or error span
      if (e.target.tagName === 'INPUT' || e.target.classList.contains('word-error')) return;
      const span = e.target.closest('.word');
      if (!span) return;
      // Cancel any in-progress edit before opening a new one
      if (editingSpan && editingSpan !== span) cancelEdit();
      if (editingSpan === span) return; // already editing this word — ignore re-click
      const word = wordById[span.dataset.id];
      if (!word) return;
      editWord(word, span);
    }

    function renderWords(words) {
      const list = document.getElementById('word-list');
      if (words.length === 0) {
        list.innerHTML = '<em>No words found in this file.</em>';
        return;
      }
      list.innerHTML = words.map(w =>
        `<span class="word" data-id="${escapeHtml(w.id)}" data-wc="${w.confidence ?? ''}">${escapeHtml(w.content)}</span> `
      ).join('');
      list.onclick = wordListClickHandler;
    }

    /**
     * renderBlocks(paraBlocks)
     * Renders structured paragraph blocks into #word-list, replacing the flat word stream.
     * Each paraBlock becomes a .para-block div with data-role attribute.
     * Word spans are identical to renderWords() output — applyConfidenceStyling() still works.
     */
    function renderBlocks(paraBlocks) {
      const list = document.getElementById('word-list');
      const hasWords = paraBlocks.some(pb => pb.words.length > 0);
      if (paraBlocks.length === 0 || !hasWords) {
        list.innerHTML = '<em>No words found in this file.</em>';
        return;
      }
      const html = paraBlocks.map(pb =>
        `<div class="para-block" data-role="${escapeHtml(pb.role)}">${
          pb.words.map(w =>
            `<span class="word" data-id="${escapeHtml(w.id)}" data-wc="${w.confidence ?? ''}">${escapeHtml(w.content)}</span> `
          ).join('')
        }</div>`
      ).join('');
      list.innerHTML = html;
      list.onclick = wordListClickHandler;
    }

    /**
     * updateStructSummary(paraBlocks)
     * Counts non-empty blocks by role and displays a summary string below the confidence badge.
     * Roles counted in order: heading, paragraph, caption, advertisement.
     */
    function updateStructSummary(paraBlocks) {
      const el = document.getElementById('struct-summary');
      if (!el) return;  // defensive guard
      const counts = { heading: 0, paragraph: 0, caption: 0, advertisement: 0 };
      for (const pb of paraBlocks) {
        if (pb.words.length > 0 && pb.role in counts) {
          counts[pb.role]++;
        }
      }
      const parts = [];
      if (counts.heading > 0)
        parts.push(`${counts.heading} ${counts.heading === 1 ? 'heading' : 'headings'}`);
      if (counts.paragraph > 0)
        parts.push(`${counts.paragraph} ${counts.paragraph === 1 ? 'paragraph' : 'paragraphs'}`);
      if (counts.caption > 0)
        parts.push(`${counts.caption} ${counts.caption === 1 ? 'caption' : 'captions'}`);
      if (counts.advertisement > 0)
        parts.push(`${counts.advertisement} ${counts.advertisement === 1 ? 'ad' : 'ads'}`);
      el.textContent = parts.join(', ');
    }

    function selectWord(word, span) {
      document.querySelectorAll('.word.selected').forEach(s => s.classList.remove('selected'));
      span.classList.add('selected');
      activeWord = word;

      showHighlight(word);

      const rect = document.getElementById('highlight-rect');
      rect.dataset.wordId = word.id;
      rect.style.pointerEvents = 'all';

      rect.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showHighlight(word) {
      const img = document.getElementById('tiff-img');
      if (!img.clientWidth || !pageWidth || !pageHeight) return;
      const scaleX = img.clientWidth / pageWidth;
      const scaleY = img.clientHeight / pageHeight;
      const rect = document.getElementById('highlight-rect');
      rect.setAttribute('x', word.hpos * scaleX);
      rect.setAttribute('y', word.vpos * scaleY);
      rect.setAttribute('width', word.width * scaleX);
      rect.setAttribute('height', word.height * scaleY);
      rect.style.display = '';
    }

    function clearHighlight() {
      const rect = document.getElementById('highlight-rect');
      rect.style.display = 'none';
      rect.style.pointerEvents = 'none';
      activeWord = null;
    }

    function setupResizeObserver() {
      const panel = document.getElementById('image-panel');
      const observer = new ResizeObserver(() => {
        recomputeFitScale();
        if (activeWord !== null) showHighlight(activeWord);
      });
      observer.observe(panel);
    }

    function setupNavButtons() {
      document.getElementById('btn-prev').addEventListener('click', () => navigateTo(currentIndex - 1));
      document.getElementById('btn-next').addEventListener('click', () => navigateTo(currentIndex + 1));
    }

    function navigateTo(index) {
      if (index >= 0 && index < stems.length) loadFile(index);
    }

    function setupKeyboard() {
      document.addEventListener('keydown', (e) => {
        if (document.activeElement.tagName === 'INPUT') return;
        if (e.key === 'ArrowLeft') navigateTo(currentIndex - 1);
        if (e.key === 'ArrowRight') navigateTo(currentIndex + 1);
        if (e.key === '+' || e.key === '=') {
          e.preventDefault();
          applyZoom(ZOOM_STEP, null);
        }
        if (e.key === '-') {
          e.preventDefault();
          applyZoom(1 / ZOOM_STEP, null);
        }
        if (e.key === '0') {
          e.preventDefault();
          recomputeFitScale();
        }
      });
    }

    function editWord(word, span) {
      // Hide SVG overlay for this word while editing
      clearHighlight();

      editingSpan = span;

      // Measure span's current rendered width for input sizing
      const spanWidth = Math.max(60, span.offsetWidth);

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'word-input';
      input.value = word.content;
      input.style.width = spanWidth + 'px';
      input.dataset.wordId = word.id;

      const errorSpan = document.createElement('span');
      errorSpan.className = 'word-error';
      errorSpan.style.display = 'none';

      // Replace span content with input (keep span in DOM for cancel restore)
      span.textContent = '';
      span.appendChild(input);
      span.appendChild(errorSpan);

      input.focus();
      input.select();

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          saveWord(word, span, input, errorSpan);
        }
        if (e.key === 'Escape') {
          e.preventDefault();
          cancelEdit();
        }
      });

      // Blur = cancel (silently restore)
      input.addEventListener('blur', () => {
        // Use setTimeout to let click on another word fire first,
        // so cancelEdit() from the onclick handler runs before blur
        setTimeout(() => {
          if (editingSpan === span) cancelEdit();
        }, 0);
      });
    }

    function cancelEdit() {
      if (!editingSpan) return;
      const span = editingSpan;
      const word = wordById[span.dataset.id];
      editingSpan = null;
      // Restore original text
      span.textContent = '';
      span.appendChild(document.createTextNode(word ? word.content : ''));
      // Restore SVG overlay for the word whose edit was cancelled
      if (word) {
        activeWord = word;
        showHighlight(word);
      }
    }

    async function saveWord(word, span, input, errorSpan) {
      const raw = input.value;
      if (!raw.trim()) {
        errorSpan.textContent = 'Word cannot be empty';
        errorSpan.style.display = '';
        return;
      }
      errorSpan.style.display = 'none';

      const stem = stems[currentIndex];
      let resp;
      try {
        resp = await fetch(`/save/${encodeURIComponent(stem)}`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({word_id: word.id, content: raw}),
        });
      } catch (err) {
        errorSpan.textContent = 'Save failed — network error';
        errorSpan.style.display = '';
        return;
      }

      if (!resp.ok) {
        errorSpan.textContent = 'Save failed — invalid content';
        errorSpan.style.display = '';
        return;
      }

      // Success: update in-memory word, restore span with new text, flash green
      word.content = raw;
      editingSpan = null;
      span.textContent = '';
      span.appendChild(document.createTextNode(raw));
      // Trigger green flash — remove class first to allow re-animation if saved twice
      span.classList.remove('word-saved');
      void span.offsetWidth; // force reflow
      span.classList.add('word-saved');
      span.addEventListener('animationend', () => span.classList.remove('word-saved'), {once: true});

      // Restore SVG overlay on the now-corrected word span
      activeWord = word;
      showHighlight(word);

      // Return focus to text panel
      document.getElementById('text-panel').focus();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Zoom / Pan Engine ──────────────────────────────────────────────────────

    function recomputeFitScale() {
      if (!jpeg_width || !jpeg_height) return;
      const panel = document.getElementById('image-panel');
      // Fit the whole image into the panel (contain mode — show full page)
      const scaleW = panel.clientWidth / jpeg_width;
      const scaleH = panel.clientHeight / jpeg_height;
      fitScale = Math.min(scaleW, scaleH);
      zoomLevel = 1.0;
      // Center the image in the panel
      panX = (panel.clientWidth  - jpeg_width  * fitScale) / 2;
      panY = (panel.clientHeight - jpeg_height * fitScale) / 2;
      applyTransform();  // applyTransform calls updateResetButton()
    }

    function applyTransform() {
      const scale = fitScale * zoomLevel;
      document.getElementById('image-container').style.transform =
        `translate(${panX}px, ${panY}px) scale(${scale})`;
      updateResetButton();
    }

    function clampPan() {
      const scale = fitScale * zoomLevel;
      const renderedW = jpeg_width  * scale;
      const renderedH = jpeg_height * scale;
      const panel = document.getElementById('image-panel');
      const panelW = panel.clientWidth;
      const panelH = panel.clientHeight;
      // At least 20% of the rendered image must remain visible on each axis
      panX = Math.min(panelW * 0.8, Math.max(-(renderedW * 0.8), panX));
      panY = Math.min(panelH * 0.8, Math.max(-(renderedH * 0.8), panY));
    }

    function applyZoom(factor, origin) {
      if (editingSpan) cancelEdit();
      const newZoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, zoomLevel * factor));
      const panel = document.getElementById('image-panel');
      const cx = origin ? origin.x : panel.clientWidth / 2;
      const cy = origin ? origin.y : panel.clientHeight / 2;
      const scale = fitScale * zoomLevel;
      const imgX = (cx - panX) / scale;
      const imgY = (cy - panY) / scale;
      const newScale = fitScale * newZoom;
      panX = cx - imgX * newScale;
      panY = cy - imgY * newScale;
      zoomLevel = newZoom;
      clampPan();
      applyTransform();
    }

    function setupZoomPan() {
      const panel = document.getElementById('image-panel');

      // Mouse-wheel zoom
      panel.addEventListener('wheel', (e) => {
        e.preventDefault();
        applyZoom(e.deltaY < 0 ? ZOOM_STEP : 1 / ZOOM_STEP, {x: e.offsetX, y: e.offsetY});
      }, {passive: false});

      // Pointer-based pan — setPointerCapture keeps drag alive outside the panel.
      // RAF throttling: buffer the latest position and write the transform only
      // once per display frame instead of on every raw pointermove event.
      let rafPending = false;
      let pendingPanX = 0;
      let pendingPanY = 0;

      panel.addEventListener('pointerdown', (e) => {
        if (e.button !== 0) return;
        isDragging = true;
        didPan = false;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        dragStartPanX = panX;
        dragStartPanY = panY;
        panel.setPointerCapture(e.pointerId);
        panel.classList.add('dragging');
      });

      panel.addEventListener('pointermove', (e) => {
        if (!isDragging) return;
        const dx = e.clientX - dragStartX;
        const dy = e.clientY - dragStartY;
        if (!didPan && Math.hypot(dx, dy) > 4) {
          didPan = true;
          if (editingSpan) cancelEdit();
        }
        if (!didPan) return;
        pendingPanX = dragStartPanX + dx;
        pendingPanY = dragStartPanY + dy;
        if (!rafPending) {
          rafPending = true;
          requestAnimationFrame(() => {
            panX = pendingPanX;
            panY = pendingPanY;
            clampPan();
            applyTransform();
            rafPending = false;
          });
        }
      });

      panel.addEventListener('pointerup', () => {
        isDragging = false;
        panel.classList.remove('dragging');
      });

      panel.addEventListener('pointercancel', () => {
        isDragging = false;
        panel.classList.remove('dragging');
      });
    }

    function updateResetButton() {
      let btn = document.getElementById('zoom-reset-btn');
      if (!btn) {
        btn = document.createElement('button');
        btn.id = 'zoom-reset-btn';
        document.getElementById('image-panel').appendChild(btn);
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          recomputeFitScale();
        });
      }
      const isDefault = (Math.abs(zoomLevel - 1.0) < 0.01);
      btn.style.display = isDefault ? 'none' : '';
      if (!isDefault) {
        const pct = Math.round(zoomLevel * 100);
        btn.textContent = `${pct}% \u22A1`;
      }
    }

    // ── Segment / Region Overlay ──────────────────────────────────────────────

    function clearSegmentRegions() {
      const svg = document.getElementById('overlay');
      svg.querySelectorAll('.segment-region, .segment-label').forEach(el => el.remove());
    }

    function showSegmentRegions(regions) {
      clearSegmentRegions();
      if (!regions || regions.length === 0) return;
      const svg = document.getElementById('overlay');
      // jpeg_width/jpeg_height are set by loadFile() from the /alto/<stem> response
      const W = jpeg_width;
      const H = jpeg_height;
      if (!W || !H) return;

      regions.forEach(r => {
        const bb = r.bounding_box;
        const x = bb.x * W;
        const y = bb.y * H;
        const w = bb.width * W;
        const h = bb.height * H;
        const color = REGION_COLORS[r.type] || 'rgba(150,150,150,0.25)';
        const stroke = color.replace(/[\d.]+\)$/, '0.8)');  // opaque stroke

        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', x);
        rect.setAttribute('y', y);
        rect.setAttribute('width', w);
        rect.setAttribute('height', h);
        rect.setAttribute('fill', color);
        rect.setAttribute('stroke', stroke);
        rect.classList.add('segment-region');
        svg.appendChild(rect);

        const labelText = `${r.type}: ${r.title.slice(0, 40)}`;
        const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        label.setAttribute('x', x + 4);
        label.setAttribute('y', y + 14);
        label.textContent = labelText;
        label.classList.add('segment-label');
        svg.appendChild(label);
      });
    }

    function downloadTei() {
      if (!currentStem) return;
      window.location = '/tei/' + encodeURIComponent(currentStem);
    }

    async function segmentPage() {
      if (!currentStem) return;
      const btn = document.getElementById('segment-btn');
      const status = document.getElementById('segment-status');

      btn.disabled = true;
      btn.classList.add('running');
      status.textContent = '';
      status.classList.remove('visible');

      try {
        const resp = await fetch(`/segment/${currentStem}`, { method: 'POST' });
        const data = await resp.json();
        if (!resp.ok) {
          status.textContent = resp.status === 503
            ? 'VLM not configured on this server'
            : (data.error || `Error ${resp.status}`);
          status.classList.add('visible');
          return;
        }
        showSegmentRegions(data.regions);
        const count = data.regions.length;
        status.textContent = count > 0
          ? `${count} region${count !== 1 ? 's' : ''} detected`
          : 'No regions detected';
        status.style.color = '#555';
        status.classList.add('visible');
      } catch (err) {
        status.textContent = 'Network error';
        status.classList.add('visible');
      } finally {
        btn.disabled = false;
        btn.classList.remove('running');
      }
    }

    async function loadSegments(stem) {
      clearSegmentRegions();
      const status = document.getElementById('segment-status');
      status.classList.remove('visible');
      try {
        const resp = await fetch(`/segment/${stem}`);
        if (resp.ok) {
          const data = await resp.json();
          showSegmentRegions(data.regions);
          const count = data.regions.length;
          if (count > 0) {
            status.textContent = `${count} region${count !== 1 ? 's' : ''} (stored)`;
            status.style.color = '#555';
            status.classList.add('visible');
          }
        }
        // 404 is expected when not yet segmented — silently ignored
      } catch (e) {
        // Network error — silently ignored (segmentation is optional)
      }
    }

    // ── Article Browser ────────────────────────────────────────────────────────

    let currentBlocks = [];     // TextBlocks array for current stem (populated in loadFile())
    let currentArticles = [];   // regions array for current stem
    let activeArticleId = null; // region_id of highlighted article card

    async function loadArticles(stem) {
      currentArticles = [];
      activeArticleId = null;
      renderArticleList([]);  // clear previous
      try {
        const resp = await fetch(`/articles/${encodeURIComponent(stem)}`);
        if (!resp.ok) return;  // 404 = not yet segmented — silently skip
        const data = await resp.json();
        currentArticles = data.regions || [];
        renderArticleList(currentArticles);
        // Re-render with VLM role assignment now that article data has resolved
        // Guard: only if ALTO blocks are present for this page
        if (currentBlocks && currentBlocks.length > 0) {
          const paraBlocks = buildParaBlocks(currentBlocks, wordById, currentArticles, pageWidth, pageHeight);
          renderBlocks(paraBlocks);
          updateStructSummary(paraBlocks);
          applyConfidenceStyling(wcThreshold);
        }
      } catch (e) {
        // Network error — silently skip (article list is optional)
      }
    }

    function renderArticleList(regions) {
      const panel = document.getElementById('text-panel');
      // Remove previous article section if present
      const existing = document.getElementById('article-section');
      if (existing) existing.remove();
      if (!regions || regions.length === 0) return;

      const section = document.createElement('div');
      section.id = 'article-section';

      const heading = document.createElement('h3');
      heading.textContent = `Articles (${regions.length})`;
      section.appendChild(heading);

      regions.forEach(region => {
        const card = document.createElement('div');
        card.className = 'article-card';
        card.dataset.regionId = region.id;

        const typeEl = document.createElement('div');
        typeEl.className = 'article-type';
        typeEl.textContent = region.type || 'unknown';

        const titleEl = document.createElement('div');
        titleEl.textContent = region.title || '(no title)';

        card.appendChild(typeEl);
        card.appendChild(titleEl);
        card.addEventListener('click', () => selectArticle(region, card));
        section.appendChild(card);
      });

      panel.appendChild(section);
    }

    function selectArticle(region, cardEl) {
      // Deactivate previously active card
      document.querySelectorAll('.article-card.active').forEach(c => c.classList.remove('active'));
      if (activeArticleId === region.id) {
        // Second click on same card — deselect
        activeArticleId = null;
        clearArticleHighlight();
        return;
      }
      activeArticleId = region.id;
      cardEl.classList.add('active');
      highlightRegion(region);
    }

    function highlightRegion(region) {
      if (!region || !region.bounding_box) return;
      const W = jpeg_width;
      const H = jpeg_height;
      if (!W || !H) return;

      const bb = region.bounding_box;
      const x = bb.x * W;
      const y = bb.y * H;
      const w = bb.width * W;
      const h = bb.height * H;

      const rect = document.getElementById('article-highlight-rect');
      rect.setAttribute('x', x);
      rect.setAttribute('y', y);
      rect.setAttribute('width', w);
      rect.setAttribute('height', h);
      rect.style.display = 'block';
    }

    function clearArticleHighlight() {
      document.getElementById('article-highlight-rect').style.display = 'none';
    }

    function highlightRegionById(regionId) {
      if (!regionId) return;
      const region = currentArticles.find(r => r.id === regionId);
      if (!region) return;
      const card = document.querySelector(`.article-card[data-region-id="${CSS.escape(regionId)}"]`);
      selectArticle(region, card || document.createElement('div'));
    }
  </script>
</body>
