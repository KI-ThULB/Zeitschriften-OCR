<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Zeitschriften-OCR Upload</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 24px;
    }
    header {
      margin-bottom: 24px;
    }
    header h1 {
      font-size: 1.4rem;
      color: #333;
      margin: 0 0 4px 0;
    }
    header a {
      font-size: 0.85rem;
      color: #1a73e8;
      text-decoration: none;
    }
    header a:hover {
      text-decoration: underline;
    }
    #drop-zone {
      border: 3px dashed #999;
      border-radius: 8px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 16px;
    }
    #drop-zone.dragover {
      background: #e8f0fe;
      border-color: #1a73e8;
    }
    #drop-zone p {
      margin: 0;
      color: #555;
    }
    #drop-zone p.main-text {
      font-size: 1rem;
      margin-bottom: 6px;
    }
    #drop-zone p.sub-text {
      font-size: 0.85rem;
      color: #888;
    }
    #queue-section {
      margin-top: 8px;
    }
    #status-line {
      font-size: 0.85rem;
      color: #555;
      margin-bottom: 8px;
      min-height: 1.4em;
    }
    #file-list {
      list-style: none;
      padding: 0;
      margin: 16px 0;
    }
    li.file-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }
    li.file-row .name {
      flex: 1;
      font-size: 0.9rem;
    }
    li.file-row .remove {
      cursor: pointer;
      color: #888;
      font-size: 1.1rem;
      border: none;
      background: none;
      padding: 0 4px;
    }
    li.file-row .remove:hover {
      color: #333;
    }
    li.state-pending .name {
      color: #555;
    }
    li.state-processing .name::before {
      content: "\21BB ";
      color: #1a73e8;
    }
    li.state-done .name {
      color: #188038;
    }
    li.state-error .name {
      color: #c62828;
    }
    li.state-invalid {
      color: #c62828;
      font-size: 0.9rem;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }
    #progress-bar-wrap {
      display: none;
      align-items: center;
      gap: 10px;
      margin: 6px 0 10px 0;
    }
    #progress-bar-track {
      flex: 1;
      height: 10px;
      background: #e0e0e0;
      border-radius: 5px;
      overflow: hidden;
    }
    #progress-bar-fill {
      height: 100%;
      width: 0%;
      background: #1a73e8;
      border-radius: 5px;
      transition: width 0.3s ease;
    }
    #progress-bar-fill.complete {
      background: #188038;
    }
    #progress-bar-label {
      font-size: 0.8rem;
      color: #555;
      white-space: nowrap;
      min-width: 72px;
      text-align: right;
    }
    #btn-start {
      padding: 10px 28px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 16px;
    }
    #btn-start:disabled {
      opacity: 0.5;
      cursor: default;
    }
    #btn-mets {
      padding: 6px 14px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
      margin-top: 12px;
    }
    #btn-mets:hover { background: #1b5e20; }
    #mets-toast {
      font-size: 0.82rem;
      color: #c00;
      margin-top: 6px;
      display: none;
    }
    #mets-toast.visible { display: block; }
    #vlm-settings {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #ddd;
    }
    #vlm-settings h2 {
      font-size: 1rem;
      color: #333;
      margin: 0 0 12px 0;
    }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .settings-row label {
      font-size: 0.85rem;
      color: #555;
      min-width: 72px;
    }
    .settings-row input[type="text"],
    .settings-row input[type="password"],
    .settings-row select {
      flex: 1;
      min-width: 200px;
      padding: 5px 8px;
      font-size: 0.85rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .backend-radios {
      display: flex;
      gap: 16px;
      font-size: 0.85rem;
    }
    .backend-radios label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      min-width: unset;
      color: #333;
    }
    #btn-load-models {
      padding: 5px 10px;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
    }
    #btn-save-settings {
      padding: 8px 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 4px;
    }
    #btn-save-settings:hover { background: #1558b0; }
    #settings-status {
      font-size: 0.82rem;
      margin-top: 6px;
      min-height: 1.3em;
    }
    #settings-status.ok { color: #188038; }
    #settings-status.err { color: #c62828; }
  </style>
</head>
<body>
  <header>
    <h1>Zeitschriften-OCR</h1>
    <a href="/viewer/">Viewer &rarr;</a>
  </header>

  <main>
    <div id="search-bar" style="display:flex;gap:8px;margin-bottom:16px;max-width:480px;">
      <input id="search-input" type="text" placeholder="Search articles…"
             style="flex:1;padding:6px 10px;font-size:0.9rem;border:1px solid #ccc;border-radius:4px;outline:none;"
             onkeydown="if(event.key==='Enter'){doSearch();}">
      <button onclick="doSearch()"
              style="padding:6px 16px;background:#1a73e8;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:0.9rem;">
        Search
      </button>
    </div>

    <section id="drop-zone" role="button" aria-label="Drop zone for TIFF files" tabindex="0">
      <p class="main-text">Drag TIFF files here or click to browse</p>
      <p class="sub-text">Accepted: .tif, .tiff</p>
    </section>

    <input type="file" id="file-input" accept=".tif,.tiff" multiple style="display:none">

    <section id="queue-section">
      <div id="status-line"></div>
      <div id="progress-bar-wrap">
        <div id="progress-bar-track">
          <div id="progress-bar-fill"></div>
        </div>
        <span id="progress-bar-label"></span>
      </div>
      <ul id="file-list"></ul>
      <button id="btn-start" disabled>Start OCR</button>
    </section>

    <div id="mets-export" style="margin-top: 24px; padding-top: 16px; border-top: 1px solid #ddd;">
      <button id="btn-mets" onclick="downloadMets()">Download METS</button>
      <div id="mets-toast"></div>
    </div>

    <div id="vlm-settings">
      <h2>VLM Settings</h2>

      <div class="settings-row">
        <label>Backend</label>
        <div class="backend-radios">
          <label>
            <input type="radio" name="vlm-backend" value="openwebui" checked onchange="onBackendChange()">
            Open WebUI (Uni Jena)
          </label>
          <label>
            <input type="radio" name="vlm-backend" value="openrouter" onchange="onBackendChange()">
            OpenRouter
          </label>
        </div>
      </div>

      <div class="settings-row">
        <label>Base URL</label>
        <input type="text" id="vlm-base-url"
               value="https://openwebui-workshop.test.uni-jena.de/ollama/v1">
      </div>

      <div class="settings-row">
        <label>API Key</label>
        <input type="password" id="vlm-api-key" placeholder="Enter API key">
      </div>

      <div class="settings-row">
        <label>Model</label>
        <select id="vlm-model"></select>
        <button id="btn-load-models" onclick="loadModels()">Load models</button>
      </div>

      <button id="btn-save-settings" onclick="saveSettings()">Save Settings</button>
      <div id="settings-status"></div>
    </div>
  </main>

  <script>
    // ---------------------------------------------------------------------------
    // Module-level state
    // ---------------------------------------------------------------------------
    // queue: filename -> {filename, stem, state, wordCount, file}
    // 'file' holds the File object so we can upload it via FormData in startRun()
    const queue = new Map();
    let runActive = false;
    let doneCount = 0;
    let totalInRun = 0;
    let runStartTime = null;
    let sse = null;

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const statusLine = document.getElementById('status-line');
    const btnStart = document.getElementById('btn-start');

    // ---------------------------------------------------------------------------
    // Helpers
    // ---------------------------------------------------------------------------

    function stem(filename) {
      return filename.replace(/\.[^.]+$/, '').toLowerCase();
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ---------------------------------------------------------------------------
    // Drop zone setup
    // ---------------------------------------------------------------------------

    function setupDropZone() {
      dropZone.addEventListener('click', () => fileInput.click());

      dropZone.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          fileInput.click();
        }
      });

      fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
        // Reset so same file can be re-selected after removal
        fileInput.value = '';
      });

      dropZone.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFiles(e.dataTransfer.files);
      });
    }

    // ---------------------------------------------------------------------------
    // File handling
    // ---------------------------------------------------------------------------

    function handleFiles(fileList) {
      // On first new drop after a completed run: clear old results and rebuild queue
      if (!runActive && doneCount > 0) {
        queue.clear();
        clearFileList();
        doneCount = 0;
        runStartTime = null;
      }

      for (const file of fileList) {
        if (runActive) {
          // Cannot add files during active run, silently ignore
          continue;
        }

        const nameLower = file.name.toLowerCase();
        if (!nameLower.endsWith('.tif') && !nameLower.endsWith('.tiff')) {
          addInvalidRow(file.name);
          continue;
        }

        if (queue.has(file.name)) {
          // Silent de-duplication
          continue;
        }

        queue.set(file.name, {
          filename: file.name,
          stem: stem(file.name),
          state: 'pending',
          wordCount: null,
          file: file,
        });
        renderFileRow(file.name);
        updateStartButton();
      }
    }

    function addInvalidRow(filename) {
      const li = document.createElement('li');
      li.className = 'state-invalid';
      li.textContent = '\u2717 ' + filename + ' \u2014 Not a TIFF file';
      document.getElementById('file-list').appendChild(li);
      setTimeout(() => li.remove(), 3000);
    }

    function renderFileRow(filename) {
      const li = document.createElement('li');
      li.id = 'row-' + CSS.escape(filename);
      li.className = 'file-row state-pending';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'name';
      nameSpan.textContent = filename;

      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove';
      removeBtn.setAttribute('aria-label', 'Remove');
      removeBtn.setAttribute('title', 'Remove');
      removeBtn.textContent = '\u00d7';
      removeBtn.addEventListener('click', () => removeFile(filename));

      li.appendChild(nameSpan);
      li.appendChild(removeBtn);
      document.getElementById('file-list').appendChild(li);
    }

    function removeFile(filename) {
      queue.delete(filename);
      const row = document.getElementById('row-' + CSS.escape(filename));
      if (row) row.remove();
      updateStartButton();
    }

    function updateStartButton() {
      btnStart.disabled = runActive || queue.size === 0;
      btnStart.textContent = runActive ? 'Processing\u2026' : 'Start OCR';
    }

    function updateRowState(filename, state, opts) {
      opts = opts || {};
      const row = document.getElementById('row-' + CSS.escape(filename));
      if (!row) return;

      row.className = 'file-row state-' + state;

      const nameSpan = row.querySelector('.name');
      if (!nameSpan) return;

      if (state === 'done') {
        const fileStem = stem(filename);
        const link = document.createElement('a');
        link.href = '/viewer/' + encodeURIComponent(fileStem);
        link.textContent = filename;
        let detail;
        if (opts.wordCount !== null && opts.wordCount !== undefined) {
          detail = opts.wordCount + ' words';
          if (opts.elapsedTime != null && opts.elapsedTime > 0) {
            detail += ', ' + opts.elapsedTime + 's';
          }
        } else {
          detail = 'skipped';
        }
        nameSpan.innerHTML = '';
        nameSpan.appendChild(link);
        nameSpan.appendChild(document.createTextNode(' (' + detail + ')'));
        // Remove the x button once done
        const removeBtn = row.querySelector('.remove');
        if (removeBtn) removeBtn.remove();
      } else if (state === 'error') {
        const errMsg = opts.errorMsg ? opts.errorMsg : 'failed';
        nameSpan.textContent = '\u2717 ' + escapeHtml(filename) + ' \u2014 ' + escapeHtml(errMsg);
        // Remove the x button on error
        const removeBtn = row.querySelector('.remove');
        if (removeBtn) removeBtn.remove();
      }
      // state === 'processing': CSS ::before handles the spinner, leave name as-is
    }

    function clearFileList() {
      document.getElementById('file-list').innerHTML = '';
    }

    // ---------------------------------------------------------------------------
    // Status line + progress bar
    // ---------------------------------------------------------------------------

    function updateStatusLine() {
      if (!runActive) {
        statusLine.textContent = '';
        return;
      }
      const elapsed = (Date.now() - runStartTime) / 1000;
      const eta = doneCount > 0
        ? Math.round(elapsed / doneCount * (totalInRun - doneCount))
        : '?';
      const elapsedStr = elapsed < 60
        ? Math.round(elapsed) + 's'
        : Math.floor(elapsed / 60) + 'm ' + Math.round(elapsed % 60) + 's';
      statusLine.textContent = doneCount + ' / ' + totalInRun + ' files done'
        + ' \u2014 ' + elapsedStr + ' elapsed'
        + ' \u2014 ETA ' + eta + 's';
    }

    function updateProgressBar() {
      const wrap  = document.getElementById('progress-bar-wrap');
      const fill  = document.getElementById('progress-bar-fill');
      const label = document.getElementById('progress-bar-label');
      if (!runActive && doneCount === 0) {
        wrap.style.display = 'none';
        return;
      }
      wrap.style.display = 'flex';
      const pct = totalInRun > 0 ? Math.round(doneCount / totalInRun * 100) : 0;
      fill.style.width = pct + '%';
      label.textContent = doneCount + '\u202f/\u202f' + totalInRun + '\u2002(' + pct + '%)';
      if (pct >= 100) {
        fill.classList.add('complete');
      } else {
        fill.classList.remove('complete');
      }
    }

    // ---------------------------------------------------------------------------
    // OCR run
    // ---------------------------------------------------------------------------

    async function startRun() {
      // Build FormData from stored File objects in the queue
      const fd = new FormData();
      for (const [filename, entry] of queue) {
        if (entry.file) {
          fd.append('files', entry.file, filename);
        }
      }

      // POST /upload to stage files on server
      let uploadResp;
      try {
        uploadResp = await fetch('/upload', { method: 'POST', body: fd });
      } catch (err) {
        statusLine.textContent = 'Upload failed \u2014 network error';
        return;
      }

      if (!uploadResp.ok) {
        statusLine.textContent = 'Upload failed \u2014 ' + uploadResp.status;
        updateStartButton();
        return;
      }

      // Parse upload response to identify already-processed files
      let uploadData = { files: [] };
      try { uploadData = await uploadResp.json(); } catch (_) {}

      // Build set of queue keys whose ALTO XML already exists on server
      const alreadyProcessed = new Set();
      for (const result of uploadData.files) {
        if (result.already_processed) {
          for (const qKey of queue.keys()) {
            if (qKey.toLowerCase() === result.filename.toLowerCase()) {
              alreadyProcessed.add(qKey);
              break;
            }
          }
        }
      }

      // POST /run to kick off OCR
      let runResp;
      try {
        runResp = await fetch('/run', { method: 'POST' });
      } catch (err) {
        statusLine.textContent = 'Run failed \u2014 network error';
        return;
      }

      if (runResp.status === 409) {
        statusLine.textContent = 'Already running \u2014 wait for current batch to finish';
        return;
      }
      if (runResp.status === 400) {
        statusLine.textContent = 'No pending files to process';
        return;
      }
      if (!runResp.ok) {
        statusLine.textContent = 'Run failed \u2014 ' + runResp.status;
        return;
      }

      // Run accepted (202) — activate run state
      runActive = true;
      doneCount = 0;
      totalInRun = queue.size - alreadyProcessed.size;
      runStartTime = Date.now();
      updateStartButton();

      // Mark rows: already-processed → done immediately; pending → processing
      for (const [filename] of queue) {
        const row = document.getElementById('row-' + CSS.escape(filename));
        if (!row) continue;
        const removeBtn = row.querySelector('.remove');
        if (removeBtn) removeBtn.remove();
        if (alreadyProcessed.has(filename)) {
          updateRowState(filename, 'done', { wordCount: null });
        } else {
          row.className = 'file-row state-processing';
        }
      }

      updateStatusLine();
      updateProgressBar();

      // Open SSE stream to receive per-file progress
      sse = new EventSource('/stream');

      sse.addEventListener('file_done', (e) => {
        const d = JSON.parse(e.data);

        // Find the original filename in the queue by matching stems
        let filename = null;
        for (const f of queue.keys()) {
          if (stem(f) === d.stem) {
            filename = f;
            break;
          }
        }
        if (!filename) return;

        doneCount++;
        const entry = queue.get(filename);
        if (entry) {
          entry.state = d.state;
          entry.wordCount = d.word_count;
        }

        // Treat 'skipped' as done with null word count display
        const displayState = d.state === 'skipped' ? 'done' : d.state;
        const wordCount = d.state === 'skipped' ? null : d.word_count;
        updateRowState(filename, displayState, {
          wordCount: wordCount,
          errorMsg: d.error_msg,
          elapsedTime: d.elapsed_time,
        });
        updateStatusLine();
        updateProgressBar();
      });

      sse.addEventListener('run_complete', () => {
        if (sse) {
          sse.close();
          sse = null;
        }
        runActive = false;
        updateProgressBar();  // show 100% green
        statusLine.textContent = '';
        updateStartButton();
        // Fade bar out after 3s
        setTimeout(() => {
          const wrap = document.getElementById('progress-bar-wrap');
          if (wrap) wrap.style.display = 'none';
          doneCount = 0;
        }, 3000);
      });

      sse.addEventListener('error', () => {
        statusLine.textContent = 'Connection lost \u2014 reload to retry';
        if (sse) {
          sse.close();
          sse = null;
        }
        runActive = false;
        updateStartButton();
      });
    }

    // ---------------------------------------------------------------------------
    // METS export
    // ---------------------------------------------------------------------------

    async function downloadMets() {
      const toast = document.getElementById('mets-toast');
      toast.classList.remove('visible');
      toast.textContent = '';

      const resp = await fetch('/mets');

      if (resp.status === 204) {
        toast.textContent = 'No processed files yet — run OCR first.';
        toast.classList.add('visible');
        return;
      }

      if (!resp.ok) {
        toast.textContent = `Export failed (${resp.status}).`;
        toast.classList.add('visible');
        return;
      }

      // Trigger browser download
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'mets.xml';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ---------------------------------------------------------------------------
    // VLM Settings
    // ---------------------------------------------------------------------------

    const BACKEND_PRESETS = {
      openwebui: {
        baseUrl: 'https://openwebui-workshop.test.uni-jena.de/ollama/v1',
        models: [
          'llama3.2-vision:latest',
          'bakllava:latest',
          'minicpm-v:latest',
          'moondream:latest',
          'granite3.2-vision:latest',
        ],
      },
      openrouter: {
        baseUrl: 'https://openrouter.ai/api/v1',
        models: [
          'google/gemini-flash-1.5',
          'openai/gpt-4o',
          'anthropic/claude-3-5-sonnet',
          'meta-llama/llama-3.2-90b-vision-instruct',
          'google/gemini-pro-1.5',
          'anthropic/claude-3-opus',
          'openai/gpt-4o-mini',
          'mistralai/pixtral-12b',
          'qwen/qwen-vl-max',
          'anthropic/claude-3-haiku',
        ],
      },
    };

    function getSelectedBackend() {
      const radio = document.querySelector('input[name="vlm-backend"]:checked');
      return radio ? radio.value : 'openwebui';
    }

    function populateModelDropdown(models, selectedModel) {
      const select = document.getElementById('vlm-model');
      select.innerHTML = '';
      for (const m of models) {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        if (m === selectedModel) opt.selected = true;
        select.appendChild(opt);
      }
    }

    function onBackendChange() {
      const backend = getSelectedBackend();
      const preset = BACKEND_PRESETS[backend];
      document.getElementById('vlm-base-url').value = preset.baseUrl;
      populateModelDropdown(preset.models, preset.models[0]);
      document.getElementById('settings-status').textContent = '';
    }

    async function loadModels() {
      const baseUrl = document.getElementById('vlm-base-url').value.trim();
      const apiKey = document.getElementById('vlm-api-key').value.trim();
      const status = document.getElementById('settings-status');
      status.className = '';
      status.textContent = 'Loading models\u2026';

      const url = '/settings/models?base_url=' + encodeURIComponent(baseUrl)
                + '&api_key=' + encodeURIComponent(apiKey);
      try {
        const resp = await fetch(url);
        const data = await resp.json();
        if (!resp.ok) {
          // Fall back to curated list
          const backend = getSelectedBackend();
          populateModelDropdown(BACKEND_PRESETS[backend].models, null);
          status.className = 'err';
          status.textContent = 'Could not load live models \u2014 showing curated list. ('
            + (data.error || resp.status) + ')';
          return;
        }
        const models = data.models || [];
        if (models.length === 0) {
          status.className = 'err';
          status.textContent = 'No models returned by endpoint.';
          return;
        }
        const currentModel = document.getElementById('vlm-model').value;
        populateModelDropdown(models, currentModel);
        status.className = 'ok';
        status.textContent = models.length + ' models loaded.';
      } catch (err) {
        status.className = 'err';
        status.textContent = 'Network error: ' + err.message;
      }
    }

    async function saveSettings() {
      const baseUrl = document.getElementById('vlm-base-url').value.trim();
      const apiKey = document.getElementById('vlm-api-key').value.trim();
      const model = document.getElementById('vlm-model').value;
      const status = document.getElementById('settings-status');
      status.className = '';
      status.textContent = 'Saving\u2026';

      try {
        const resp = await fetch('/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            backend: 'openai_compatible',
            base_url: baseUrl,
            api_key: apiKey,
            model: model,
          }),
        });
        const data = await resp.json();
        if (!resp.ok) {
          status.className = 'err';
          status.textContent = 'Save failed: ' + (data.error || resp.status);
          return;
        }
        status.className = 'ok';
        status.textContent = '\u2713 Settings saved';
        setTimeout(() => {
          if (status.textContent === '\u2713 Settings saved') status.textContent = '';
        }, 3000);
      } catch (err) {
        status.className = 'err';
        status.textContent = 'Network error: ' + err.message;
      }
    }

    async function initSettings() {
      try {
        const resp = await fetch('/settings');
        if (!resp.ok) return;
        const data = await resp.json();
        if (!data.backend) return;  // empty settings

        // Restore base_url
        if (data.base_url) {
          document.getElementById('vlm-base-url').value = data.base_url;
          // Select matching backend radio if possible
          const isOpenRouter = data.base_url.includes('openrouter.ai');
          const radioVal = isOpenRouter ? 'openrouter' : 'openwebui';
          const radio = document.querySelector(`input[name="vlm-backend"][value="${radioVal}"]`);
          if (radio) radio.checked = true;
        }

        // Restore api_key (masked — just mark as having a value)
        if (data.api_key) {
          document.getElementById('vlm-api-key').value = data.api_key;
        }

        // Restore model — populate from preset, then set saved value
        const backend = getSelectedBackend();
        const preset = BACKEND_PRESETS[backend];
        const savedModel = data.model || '';
        const allModels = savedModel && !preset.models.includes(savedModel)
          ? [savedModel, ...preset.models]
          : preset.models;
        populateModelDropdown(allModels, savedModel || preset.models[0]);

      } catch (_) { /* silent — best-effort init */ }
    }

    // ---------------------------------------------------------------------------
    // Search
    // ---------------------------------------------------------------------------

    function doSearch() {
      const q = document.getElementById('search-input').value.trim();
      if (!q) return;
      window.location.href = '/search?q=' + encodeURIComponent(q);
    }

    // ---------------------------------------------------------------------------
    // Init
    // ---------------------------------------------------------------------------

    document.addEventListener('DOMContentLoaded', () => {
      setupDropZone();
      btnStart.addEventListener('click', startRun);
      // Start button starts disabled (queue is empty)
      updateStartButton();
      // Init VLM settings panel
      populateModelDropdown(BACKEND_PRESETS.openwebui.models, BACKEND_PRESETS.openwebui.models[0]);
      initSettings();
    });
  </script>
</body>
</html>
